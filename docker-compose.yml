services:
  db:
    image: postgres:16-alpine
    container_name: shopsmart-db
    environment:
      POSTGRES_USER: shopsmart
      POSTGRES_PASSWORD: shopsmart
      POSTGRES_DB: shopsmart
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shopsmart -d shopsmart"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build: ./backend
    container_name: shopsmart-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/code/app
      - ./data:/code/data
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: shopsmart-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
    depends_on:
      - backend

volumes:
  db_data: