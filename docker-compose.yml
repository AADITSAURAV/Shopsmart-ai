services:
  db:
    image: postgres:16-alpine
    container_name: shopsmart-db
    environment:
      POSTGRES_USER: shopsmart
      POSTGRES_PASSWORD: shopsmart
      POSTGRES_DB: shopsmart
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: shopsmart-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/code/app

  frontend:
    build: ./frontend
    container_name: shopsmart-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html

volumes:
  db_data: